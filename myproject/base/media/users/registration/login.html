{% extends 'main.html' %}

{% block title %}Login - Interview Platform{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-microphone-alt fa-3x text-primary mb-3"></i>
                    <h3 class="mb-1">Welcome Back!</h3>
                    <p class="text-muted">Sign in to continue your interview practice</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                    
                    <div class="text-center">
                        <a href="#" class="text-decoration-none small">Forgot password?</a>
                        <span class="mx-2 text-muted">|</span>
                        <a href="{% url 'register' %}" class="text-decoration-none small">Create an account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
