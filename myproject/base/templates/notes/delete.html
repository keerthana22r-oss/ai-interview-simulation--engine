{% extends 'main.html' %}

{% block title %}Delete Note{% endblock %}

{% block page_header %}
<h1 class="h2 mb-1">Delete Note</h1>
<p class="text-muted">Confirm note deletion</p>
{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4 text-center">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                <h4>Delete Note?</h4>
                <p>Are you sure you want to delete this note?</p>
                
                <div class="alert alert-secondary">
                    <p class="mb-0">{{ note.content|truncatewords:30 }}</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'session_notes_list' note.session.id %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-2"></i>Delete Note
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
