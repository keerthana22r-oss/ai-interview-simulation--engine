{% extends 'main.html' %}

{% block title %}Server Error - 500{% endblock %}

{% block content %}
<div class="text-center py-5 fade-in">
    <div class="mb-4">
        <i class="fas fa-exclamation-triangle fa-5x text-danger"></i>
    </div>
    <h1 class="display-1 fw-bold text-muted">500</h1>
    <h2 class="mb-3">Server Error</h2>
    <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
    <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'home' %}" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>Go Home
        </a>
        <a href="{% url 'contact' %}" class="btn btn-secondary">
            <i class="fas fa-envelope me-2"></i>Report Issue
        </a>
    </div>
</div>
{% endblock %}
